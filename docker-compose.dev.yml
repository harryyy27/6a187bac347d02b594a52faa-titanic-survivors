services:
  titanic_survival_predictor:
    build:
      context: ./titanic_survival_predictor
      dockerfile: Dockerfile.dev
    ports:
      - "8888:8888"
    expose:
      - 8888
    command: ["/deps/venv/bin/jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--notebook-dir=/app"]
    x-install-command: ["ln", "-sfn", "/deps/venv", "/app/.venv"]
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    expose:
      - 8000
    command: ["sh", "-c", "uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000} --reload --reload-dir /workspace/repo/api"]
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    expose:
      - 5173
    command: ["sh", "-c", "npm run dev -- --host 0.0.0.0 --port 5173"]
    x-install-command: ["sh", "-c", "ln -sf /deps/node_modules ./node_modules"]
